name: Drift Detection

on:
  schedule:
    - cron: "0 8 * * 1-5" # Weekdays at 08:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1
  TF_VERSION: "1.9.8"
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_PLAN_SA_EMAIL }}

jobs:
  drift:
    name: Detect Drift (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init

      - name: Detect Drift
        id: drift
        working-directory: environments/${{ matrix.environment }}
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift_output.txt
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        id: check_issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --label "drift" --label "${{ matrix.environment }}" --state open --json number -q '.[0].number')
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT

      - name: Create drift issue
        if: steps.drift.outputs.drift_detected == 'true' && steps.check_issue.outputs.existing == ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const driftOutput = fs.readFileSync(
              'environments/${{ matrix.environment }}/drift_output.txt',
              'utf8'
            );
            const maxLength = 60000;
            const truncated = driftOutput.length > maxLength
              ? driftOutput.substring(0, maxLength) + '\n... (truncated)'
              : driftOutput;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected in ${{ matrix.environment }}`,
              body: `## Infrastructure Drift Detected

            **Environment:** \`${{ matrix.environment }}\`
            **Detected at:** ${new Date().toISOString()}

            <details><summary>Terraform Plan Output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            Please review and reconcile the drift.`,
              labels: ['drift', '${{ matrix.environment }}'],
            });
